<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Test Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0E0C0A; --surface: #181512; --surface2: #221D16;
      --text: #EAE3D5; --muted: #7A6E5C; --accent: #C8923A;
      --accent-hi: #E0A840; --accent-glow: rgba(200,146,58,0.20);
      --green: #5BA97A; --red: #C05858; --border: rgba(200,146,58,0.18);
      --mono: 'JetBrains Mono', monospace; --serif: 'EB Garamond', Georgia, serif;
      --r: 4px; --transition: 0.16s cubic-bezier(0.2,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: var(--serif); font-size: 18px; min-height: 100vh; }

    /* ── Menu ── */
    #test-menu { padding: 52px 36px; max-width: 860px; margin: 0 auto; }
    .menu-header { margin-bottom: 36px; }
    .chip { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: .2em;
            text-transform: uppercase; color: var(--muted); border: 1px solid var(--border);
            border-radius: 2px; padding: 3px 9px; margin-bottom: 14px; }
    .menu-header h1 { font-size: 1.9em; font-weight: 500; }
    .menu-header p  { color: var(--muted); font-size: .9em; margin-top: 6px; line-height: 1.6; }

    .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
                    padding: 18px 20px; cursor: pointer; transition: border-color var(--transition), background var(--transition); }
    .section-card:hover { border-color: var(--accent); background: var(--surface2); }
    .section-card .s-label { font-family: var(--mono); font-size: 11px; font-weight: 700;
                              letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 7px; }
    .section-card .s-desc  { font-size: .83em; color: var(--muted); line-height: 1.5; }
    .section-card .s-warn  { font-size: .76em; color: var(--red); margin-top: 7px; }

    /* ── Run view ── */
    #test-run { display: none; }
    .back-btn { position: fixed; top: 12px; left: 14px; z-index: 9999;
                font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
                color: var(--muted); background: var(--surface); border: 1px solid var(--border);
                border-radius: var(--r); padding: 6px 13px; cursor: pointer;
                transition: color var(--transition), border-color var(--transition); }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── jsPsych overrides (mirrors index.html) ── */
    #jspsych-display-element { background: var(--bg) !important; color: var(--text) !important;
      font-family: var(--serif) !important; min-height: 100vh; display: flex;
      align-items: center; justify-content: center; }
    .jspsych-content-wrapper { width: 100%; padding: 72px 32px; }
    .jspsych-content { max-width: 700px !important; margin: 0 auto; text-align: center; }
    .jspsych-content h2 { font-family: var(--serif); font-size: 2.3em; font-weight: 500; margin-bottom: 1.1em; }
    .jspsych-content h3 { font-family: var(--serif); font-size: 1.7em; font-weight: 500; margin-bottom: .9em; }
    .jspsych-content p  { font-family: var(--serif); font-size: 1.05em; line-height: 1.8; margin-bottom: .85em; }
    .jspsych-content div { font-family: var(--serif); }
    .jspsych-content strong { color: var(--accent-hi); }
    .jspsych-btn { font-family: var(--serif) !important; font-size: 1.05em !important; font-weight: 500 !important;
      background: transparent !important; color: var(--accent) !important;
      border: 1.5px solid var(--accent) !important; border-radius: var(--r) !important;
      padding: 12px 30px !important; margin: 7px !important; cursor: pointer !important;
      transition: background var(--transition), color var(--transition) !important; }
    .jspsych-btn:hover { background: var(--accent) !important; color: var(--bg) !important; }
    .lextale-word { font-family: var(--mono); font-size: 60px; font-weight: 700;
      letter-spacing: 10px; color: var(--accent); text-align: center; margin: 50px 0 58px; }
    .choice-btn { font-family: var(--mono) !important; font-size: 1.4em !important; font-weight: 500 !important;
      letter-spacing: 3px !important; padding: 18px 44px !important; min-width: 185px !important; margin: 10px 40px !important; }
    .listen-indicator { font-family: var(--serif); font-size: 12.5px; color: var(--muted);
      margin-top: 88px; text-align: center; letter-spacing: .15em; text-transform: uppercase; }
    .listen-indicator::before { content: ''; display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: var(--accent); margin-right: 10px; vertical-align: middle;
      animation: pulse 1.5s ease-in-out infinite; }
    .iti-cross { font-size: 22px; color: var(--muted); text-align: center; opacity: .35; }
    @keyframes pulse { 0%,100%{opacity:.2;transform:scale(.75)} 50%{opacity:1;transform:scale(1.3)} }
    input[type="text"], input[type="number"], select {
      background: var(--surface) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; font-family: var(--serif) !important; font-size: 1em !important;
      padding: 10px 14px !important; border-radius: var(--r) !important; outline: none !important; }
    table { border-collapse: separate; border-spacing: 10px 16px; }
    td { font-family: var(--serif); color: var(--text); vertical-align: middle; }
    audio { filter: invert(.82) hue-rotate(175deg) brightness(.85); border-radius: 30px;
            display: block; margin: 20px auto; width: 280px; }
    .jspsych-loading-progress-bar-container { background: var(--surface2) !important; border-radius: 2px !important;
      border: none !important; height: 3px !important; width: 300px !important; margin: 16px auto !important; }
    .jspsych-loading-progress-bar { background: linear-gradient(90deg,var(--accent),var(--accent-hi)) !important;
      border-radius: 2px !important; height: 3px !important; }
    ::placeholder { color: var(--muted); opacity: .55; }
  </style>
</head>
<body>
  <div id="test-menu">
    <div class="menu-header">
      <div class="chip">dev only</div>
      <h1>Test Console</h1>
      <p>Run any section in isolation. Sections marked ⚠ need generated audio files.</p>
    </div>
    <div class="section-grid" id="section-grid"></div>
  </div>
  <div id="test-run"></div>
  <script type="module" src="/src/test-main.js"></script>
</body>
</html>
